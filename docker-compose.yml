services:
  vehicle-registration:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vehicle-registration
    restart: unless-stopped
    ports:
      - "8585:8080"
    volumes:
      - ./data:/app/data
    environment:
      - FLASK_ENV=production
      - DATABASE_PATH=/app/data/database.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
